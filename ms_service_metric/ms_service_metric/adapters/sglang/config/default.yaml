# SGLang 默认 Metric 配置（示例参考）
# 
# 注意: 此配置仅作为示例参考，展示如何为 SGLang 框架配置指标。
# SGLang 适配器不作为正式发布功能。

# Scheduler
- symbol: sglang.srt.managers.scheduler:Scheduler.event_loop
  metrics:
    - name: sglang_scheduler_duration
      type: timer

# Model Runner
- symbol: sglang.srt.managers.tp_worker:TpModelWorker.forward
  metrics:
    - name: sglang_model_forward_duration
      type: timer
      label:
        - name: batch_size
          expr: len(args[0])
