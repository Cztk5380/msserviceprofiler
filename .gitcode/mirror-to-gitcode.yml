name: Mirror to GitCode

# 触发器：当 GitHub 主分支有推送时运行
on:
  push:
    branches: [ "master" ] # 请替换为你的默认分支名，如 master
  workflow_dispatch: # 允许手动触发

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史记录，确保镜像完整

      - name: Push to GitCode
        run: |
          # 替换下面的 <你的用户名> 和 <你的项目名>
          git remote add mirror https://oauth2:${GITCODE_TOKEN}@gitcode.com/ChenHuiwen/MindStudio-Service-Profiler_github.git
          git push mirror --mirror
        env:
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
