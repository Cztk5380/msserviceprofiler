name: Mirror GitCode to GitHub (Preserve Workflows)

on:
  schedule:
    - cron: '0 */2 * * *'   # 每2小时执行一次
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repository (to backup workflows)
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Backup .github/workflows directory
        run: |
          echo ">>> Backing up .github/workflows/ ..."
          if [ -d ".github/workflows" ]; then
            cp -r .github/workflows /tmp/workflows-backup
            echo "Backup completed. Files:"
            ls -la /tmp/workflows-backup/
          else
            echo "No workflows directory found, skipping backup."
          fi

      - name: Mirror branches and tags from GitCode
        run: |
          echo ">>> [1/4] Cloning bare repository from GitCode..."
          git clone --bare https://oauth2:${GITCODE_TOKEN}@gitcode.com/ChenHuiwen/MindStudio-Service-Profiler_github.git source-bare
          
          cd source-bare
          
          echo ">>> [2/4] Setting GitHub as new remote origin..."
          git remote set-url origin https://oauth2:${PAT_TOKEN}@github.com/Cztk5380/msserviceprofiler.git
          
          echo ">>> [3/4] Force pushing all branches to GitHub..."
          git push origin --force --all
          
          echo ">>> [4/4] Force pushing all tags to GitHub..."
          git push origin --force --tags
          
          echo ">>> Mirror sync completed successfully!"
        env:
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Restore .github/workflows directory
        run: |
          echo ">>> Restoring .github/workflows/ ..."
          
          git clone --branch master --depth 1 https://oauth2:${PAT_TOKEN}@github.com/Cztk5380/msserviceprofiler.git restore-repo
          cd restore-repo
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -d "/tmp/workflows-backup" ]; then
            mkdir -p .github/workflows
            cp -r /tmp/workflows-backup/* .github/workflows/
            git add .github/workflows/
            
            if git diff --cached --quiet; then
              echo "No changes to workflows, skipping commit."
            else
              git commit -m "Restore workflows after mirror sync [skip ci]"
              git push origin master
              echo "Workflows restored successfully!"
            fi
          else
            echo "No backup found, skipping restore."
          fi
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
