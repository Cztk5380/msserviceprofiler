# vLLM v1 版本 Metric 配置
# 从重构前的 service_metrics_symbols.yaml 迁移

# ===== worker =====
- symbol: vllm.v1.worker.gpu_model_runner:AsyncGPUModelRunnerOutput.get_output
  handler: ms_service_metric.adapters.vllm.handlers.metric_handlers:runner_get_output_hooker

- symbol: vllm.v1.core.sched.scheduler:Scheduler.schedule
  handler: ms_service_metric.adapters.vllm.handlers.metric_handlers:scheduler_scheduler_hooker

- symbol: vllm.v1.metrics.stats:IterationStats.update_from_output
  handler: ms_service_metric.adapters.vllm.handlers.meta_handlers:iteration_stats_update_from_output_hooker

- symbol: vllm.v1.core.sched.scheduler:Scheduler._preempt_request
  min_version: "0.9.1"
  handler: ms_service_metric.adapters.vllm.handlers.metric_handlers:scheduler_preempt_request_hooker

- symbol: vllm.v1.core.kv_cache_manager:KVCacheManager.allocate_slots
  min_version: "0.9.1"
  handler: ms_service_metric.adapters.vllm.handlers.metric_handlers:block_allocate_failure_hooker

# ===== engine =====
- symbol: vllm.v1.engine.async_llm:AsyncLLM.add_request
  metrics:
    - name: engine:async_add_request:duration


# ===== 时间拆解 =====
- symbol: vllm.v1.utils:record_function_or_nullcontext
  handler: ms_service_metric.adapters.vllm.handlers.metric_handlers:record_function_timer_hook

# vllm-ascend  version: v0.13.rc2 版本去除了capture_async，但是没关系，他们用 record_function_or_nullcontext 代替了
- symbol: vllm_ascend.utils:ProfileExecuteDuration.capture_async
  max_version: "0.13.0rc1"
  handler: ms_service_metric.adapters.vllm.handlers.metric_handlers:record_function_timer_hook_vllm_ascend

# ===== Custom Metrics（用户自定义点位）=====
- symbol: vllm.entrypoints.openai.serving_chat:OpenAIServingChat.create_chat_completion
  metrics:
    - name: server:create_chat_completion:duration
      type: timer

- symbol: vllm.v1.engine.output_processor:OutputProcessor.process_outputs
  handler: ms_service_metric.adapters.vllm.handlers.metric_handlers:process_outputs_phase_handler
  metrics:
    - name: output_processor_duration
      type: timer
    - name: engine_core_outputs_len
      expr: len(engine_core_outputs)
      type: histogram
      buckets: [0, 100, 200, 300, 400, 500, 600, 700, 800, 900, 1000, 1500, 2000, 2500, 3000, 4000, 5000, 6000, 7000, 8000, 10000, 262144]


- symbol: vllm.v1.engine.async_llm:AsyncLLM.generate  # 调用 add_request, 然后死循环等结束。
  metrics:
    - name: engine:generate:duration

- symbol: vllm.v1.engine.input_processor:InputProcessor.process_inputs
  metrics:
    - name: engine:tokenizer_encode

- symbol: vllm.v1.core.sched.scheduler:Scheduler.update_from_output
  handler: ms_service_metric.adapters.vllm.handlers.metric_handlers:engine_core_phase_handler
  metrics:
    - name: scheduler:update_from_output:duration

- symbol: vllm.v1.metrics.loggers:StatLoggerManager.record
  handler: ms_service_metric.adapters.vllm.handlers.metric_handlers:record_stats_phase_handler
  metrics:
    - name: async_llm:record_stats:duration

- symbol: vllm.v1.engine.core_client:AsyncMPClient.abort_requests_async
  handler: ms_service_metric.adapters.vllm.handlers.metric_handlers:abort_requests_phase_handler
  metrics:
    - name: async_llm:abort_requests:duration

- symbol: vllm.v1.engine.core_client:DPAsyncMPClient.abort_requests_async
  handler: ms_service_metric.adapters.vllm.handlers.metric_handlers:abort_requests_phase_handler
  metrics:
    - name: async_llm:abort_requests:duration

- symbol: vllm.v1.engine.core_client:DPLBAsyncMPClient.abort_requests_async
  handler: ms_service_metric.adapters.vllm.handlers.metric_handlers:abort_requests_phase_handler
  metrics:
    - name: async_llm:abort_requests:duration

# ===== Executor =====
- symbol: vllm.v1.executor.multiproc_executor:MultiprocExecutor.execute_model
  handler: ms_service_metric.adapters.vllm.handlers.metric_handlers:executor_execute_model_phase_handler
  metrics:
    - name: executor:execute_model:duration

- symbol: vllm.v1.executor.multiproc_executor:MultiprocExecutor.collective_rpc
  handler: ms_service_metric.adapters.vllm.handlers.metric_handlers:rpc_error_hooker

- symbol: vllm_ascend.worker.model_runner_v1:NPUModelRunner.execute_model
  handler: ms_service_metric.adapters.vllm.handlers.metric_handlers:model_runner_phase_handler
  metrics:
    - name: executor:model_runner_execute_model:duration

- symbol: vllm_ascend.worker.model_runner_v1:NPUModelRunner._prepare_inputs
  handler: ms_service_metric.adapters.vllm.handlers.metric_handlers:model_runner_phase_handler
  metrics:
    - name: executor:prepare_inputs:duration

- symbol: vllm_ascend.eplb.core.eplb_worker:EplbWorker.do_update
  handler: ms_service_metric.adapters.vllm.handlers.metric_handlers:eplb_do_update_hotness_handler

- symbol: vllm_ascend.eplb.core.eplb_device_transfer_loader:D2DExpertWeightLoader.update_expert_map_and_weight
  metrics:
    - name: eplb:expert_weight_update:duration

- symbol: vllm_ascend.eplb.adaptor.vllm_adaptor:VllmEplbAdaptor.do_update_expert_map
  metrics:
    - name: eplb:expert_map_update:duration

- symbol: vllm_ascend.eplb.adaptor.vllm_adaptor:VllmEplbAdaptor.do_update_log2phy_map
  metrics:
    - name: eplb:log2phy_map_update:duration

- symbol: vllm_ascend.eplb.adaptor.vllm_adaptor:VllmEplbAdaptor.do_update_expert_weight
  metrics:
    - name: eplb:expert_weight_replace:duration

- symbol: vllm_ascend.worker.worker:NPUWorker.compile_or_warm_up_model
  handler: ms_service_metric.adapters.vllm.handlers.metric_handlers:engine_memory_phase_handler
  metrics:
    - name: engine:memory:total_gb
      type: gauge
    - name: engine:memory:utilization_ratio
      type: gauge
    - name: engine:memory:reserved_gb
      type: gauge
    - name: engine:memory:weights_gb
      type: gauge
    - name: engine:memory:kvcache_gb
      type: gauge
    - name: engine:memory:non_torch_gb
      type: gauge
    - name: engine:memory:activation_gb
      type: gauge
    - name: engine:memory:graph_gb
      type: gauge

# - symbol: vllm.v1.sample.sampler:Sampler.forward
#   metrics:
#     - name: executor:sampler:duration
#       expr: duration

- symbol: vllm.v1.executor.multiproc_executor:MultiprocExecutor.sample_tokens
  handler: ms_service_metric.adapters.vllm.handlers.metric_handlers:engine_core_phase_handler
  metrics:
    - name: executor:sample_tokens:duration


# ===== engine core processor =====
- symbol: vllm.v1.engine.core:EngineCoreProc._process_input_queue
  handler: ms_service_metric.adapters.vllm.handlers.metric_handlers:engine_core_phase_handler
  metrics:
    - name: engine_core:process_input_queue:duration

- symbol: vllm.v1.engine.core:EngineCoreProc._process_engine_step
  handler: ms_service_metric.adapters.vllm.handlers.metric_handlers:engine_core_phase_handler
  metrics:
    - name: engine_core:process_engine_step:duration

- symbol: vllm.v1.engine.core:EngineCore.step
  handler: ms_service_metric.adapters.vllm.handlers.metric_handlers:engine_core_phase_handler
  metrics:
    - name: engine_core:engine_core_step:duration

# ===== Batch | Scheduler =====
- symbol: vllm.v1.core.sched.scheduler:Scheduler.add_request # 添加到 waiting 队列，request 会记录时间
  metrics:
    - name: scheduler:add_request:duration
